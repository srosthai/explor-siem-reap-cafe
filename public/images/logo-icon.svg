<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="pin" x1="50" y1="0" x2="50" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C4A2D"/>
      <stop offset="100%" stop-color="#5C3318"/>
    </linearGradient>
    <linearGradient id="cream" x1="50" y1="20" x2="50" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFDF5"/>
      <stop offset="100%" stop-color="#F5DEB3"/>
    </linearGradient>
    <linearGradient id="coffee" x1="50" y1="42" x2="50" y2="68" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5E3C"/>
      <stop offset="100%" stop-color="#5C3318"/>
    </linearGradient>
    <clipPath id="cup-clip">
      <rect x="32" y="30" width="36" height="40" rx="5"/>
    </clipPath>
  </defs>

  <!-- Pin shadow -->
  <ellipse cx="50" cy="94" rx="14" ry="4" fill="#000" opacity="0.1"/>

  <!-- Map pin shape -->
  <path d="M50 4C30.1 4 14 20.1 14 40c0 24.5 32.4 50.8 33.8 52a3.2 3.2 0 004.4 0C53.6 90.8 86 64.5 86 40 86 20.1 69.9 4 50 4z" fill="url(#pin)"/>

  <!-- Pin inner highlight -->
  <path d="M50 8C32.3 8 18 22.3 18 40c0 22 29.5 46 30.8 47.1a1.8 1.8 0 002.4 0C52.5 86 82 62 82 40 82 22.3 67.7 8 50 8z" fill="#6B4226" opacity="0.6"/>

  <!-- Coffee cup body -->
  <rect x="33" y="31" width="34" height="38" rx="5" fill="#D4A76A"/>
  <rect x="33" y="31" width="34" height="38" rx="5" fill="#C49A6C" stroke="#8B5E3C" stroke-width="1.5"/>

  <!-- Coffee liquid -->
  <g clip-path="url(#cup-clip)">
    <rect x="32" y="44" width="36" height="26" fill="url(#coffee)"/>
    <!-- Bubbles -->
    <circle cx="42" cy="54" r="2.5" fill="#A0714A" opacity="0.5"/>
    <circle cx="52" cy="50" r="2" fill="#A0714A" opacity="0.4"/>
    <circle cx="58" cy="56" r="1.8" fill="#A0714A" opacity="0.4"/>
    <circle cx="47" cy="60" r="2.2" fill="#A0714A" opacity="0.3"/>
  </g>

  <!-- Cup rim highlight -->
  <rect x="33" y="31" width="34" height="4" rx="2" fill="#DEB887" opacity="0.7"/>

  <!-- Whipped cream -->
  <ellipse cx="50" cy="32" rx="14" ry="6" fill="url(#cream)"/>
  <ellipse cx="50" cy="30" rx="10" ry="5.5" fill="#FFF8E7"/>
  <ellipse cx="50" cy="27" rx="7" ry="5" fill="url(#cream)"/>
  <ellipse cx="50" cy="24" rx="4.5" ry="4" fill="#FFFDF5"/>
  <ellipse cx="50" cy="22" rx="3" ry="3" fill="#FFF"/>

  <!-- Straw -->
  <rect x="48.5" y="8" width="3" height="18" rx="1.5" fill="#2B8A4B"/>
  <rect x="48.5" y="8" width="3" height="3" rx="1.5" fill="#1F6E3A"/>

  <!-- Wi-Fi arcs (left side) -->
  <path d="M20 32c5-5 10.5-7.5 14-8.5" stroke="#FFF" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M23 37c3.5-3.5 7.5-5.5 11-6.5" stroke="#FFF" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M26 42c2.5-2.5 5-4 8-4.8" stroke="#FFF" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.85"/>
  <circle cx="33" cy="43" r="2" fill="#FFF" opacity="0.9"/>

  <!-- Map pin accent (top right) -->
  <circle cx="76" cy="28" r="5.5" fill="#E53E3E"/>
  <circle cx="76" cy="28" r="2.5" fill="#FFF"/>
  <path d="M76 33.5L73.5 38h5z" fill="#E53E3E"/>
</svg>
